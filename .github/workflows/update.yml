name: Update JSON

on:
  push:
    paths:
      - 'database.csv'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v3
        with:
          node-version: '18'

      - run: node convert.js

      - run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add tracks.json
          git commit -m "update json" || echo "no changes"
          git push
